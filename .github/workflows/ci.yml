name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# cancel superseded runs on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  matrix:
    name: target matrix
    # Representative set (full: false by default): x86_64 host + both thumbv7em ABIs.
    # The complete matrix runs in full.yml (push:main / nightly) and on release.
    uses: ./.github/workflows/matrix.yml

  test:
    name: test (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # "1.85" is the MSRV and must match Cargo.toml `rust-version`
        rust: [stable, "1.85"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - name: Test (default, no_std-shaped)
        run: cargo test -p multicalc
      - name: Test (alloc feature)
        run: cargo test -p multicalc --features alloc
      - name: Doctests
        run: cargo test -p multicalc --doc

  qa:
    name: qa fixtures (host-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Reads committed fixtures only — never runs Python, never downloads MuJoCo.
      - run: cargo test -p multicalc-qa
      - name: Smoke fixtures are up to date
        run: |
          cargo run -p multicalc-qa --bin gen_smoke_fixtures
          git diff --exit-code tools/embedded-smoke/src/fixtures.rs
      - name: Accuracy tables are up to date
        run: |
          cargo run -p multicalc-qa --bin gen_accuracy_tables
          git diff --exit-code benchmarks/*.md

  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Formatting
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy -p multicalc --all-targets --features alloc -- -D warnings
      - name: No nightly features
        run: |
          if grep -rnE '#!\[feature\(|generic_const_exprs' crates/*/src; then
            echo "Nightly-only features are not allowed on stable."
            exit 1
          fi

  docs:
    name: doc build
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build docs (deny warnings, broken links)
        run: cargo doc -p multicalc --no-deps --all-features

  no_std:
    name: bare-metal (thumbv7em-none-eabi)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabi, thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@v2
      - name: Build for bare metal (no default features)
        run: cargo build -p multicalc --no-default-features --target thumbv7em-none-eabi

  # Disabled until the library's public API stabilizes; re-enable once it has
  # gained more maturity.
  # semver:
  #   name: semver-checks
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: dtolnay/rust-toolchain@stable
  #     - uses: Swatinem/rust-cache@v2
  #     - uses: taiki-e/install-action@cargo-semver-checks
  #     - name: Check for unplanned breaking changes
  #       run: cargo semver-checks --package multicalc

  package:
    name: package + examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build headless demos
        run: cargo build -p multicalc-demos --examples --no-default-features
      - name: Run basics
        run: bash scripts/run_examples.sh
      # runs a clean `cargo package` build — the same packaging the Step 15
      # release workflow relies on, so a release can't fail at publish time
      - name: Packaging dry-run
        run: cargo publish -p multicalc --dry-run
      - name: Build timings
        run: cargo build -p multicalc --timings
      - uses: actions/upload-artifact@v4
        with:
          name: cargo-timings
          path: target/cargo-timings/*.html

  # Green only if every representative job passed.
  # Branch protection points at this job, so adding or removing a job above never
  # needs a settings change.
  ci-success:
    name: CI success
    if: always()
    needs: [matrix, test, qa, lint, docs, no_std, package]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any dependency failed or was cancelled
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
