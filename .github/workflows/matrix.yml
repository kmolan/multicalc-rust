name: Target matrix

# Reusable: called by CI on pull requests and by Release on a version bump.
#
# `full` selects the target set. false (default) = the per-PR representative set
# (x86_64 host + all four bare-metal ABIs, thumbv6m as a reduced canary); true =
# the complete matrix, adding the aarch64 host. The `setup` job turns that flag into
# the JSON matrices the build jobs consume, so representative and full share one set
# of steps and differ only in the host list.
on:
  workflow_call:
    inputs:
      full:
        description: Run the complete target matrix (adds aarch64 host + thumbv6m).
        type: boolean
        default: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    shell: bash

jobs:
  setup:
    name: resolve target matrix
    runs-on: ubuntu-latest
    outputs:
      hosts: ${{ steps.m.outputs.hosts }}
      bare: ${{ steps.m.outputs.bare }}
    steps:
      - id: m
        shell: bash
        run: |
          # thumbv6m runs the reduced canary (--no-default-features) on every PR; the
          # thumbv7em ABIs and riscv32  run the full set. The bare set is the same for
          # representative and full runs — full only adds the aarch64 host.
          bare='[{"target":"thumbv7em-none-eabi","args":""},{"target":"thumbv7em-none-eabihf","args":""},{"target":"thumbv6m-none-eabi","args":"--no-default-features"},{"target":"riscv32imc-unknown-none-elf","args":""}]'
          if [ "${{ inputs.full }}" = "true" ]; then
            hosts='[{"target":"x86_64-unknown-linux-gnu","runner":"ubuntu-latest"},{"target":"aarch64-unknown-linux-gnu","runner":"ubuntu-24.04-arm"}]'
          else
            hosts='[{"target":"x86_64-unknown-linux-gnu","runner":"ubuntu-latest"}]'
          fi
          echo "hosts=$hosts" >> "$GITHUB_OUTPUT"
          echo "bare=$bare" >> "$GITHUB_OUTPUT"
          echo "full=${{ inputs.full }} -> hosts=$hosts bare=$bare"

  hosts:
    name: host ${{ matrix.target }}
    needs: setup
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.hosts) }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Runs the library tests on each host. This overlaps the x86_64 `test` job on
      # purpose so the matrix is one complete cross-target gate on its own.
      - name: Build and test
        run: cargo test -p multicalc

  bare-metal:
    name: bare-metal ${{ matrix.target }}
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.bare) }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      # cargo-binutils provides `cargo size`, used by the budget check. It wraps
      # the llvm-tools-preview component installed above. rust-cache does not cover
      # installed binaries, so cache the compiled tool separately (built from source
      # on a cache miss, restored on a hit).
      - name: Install cargo-binutils (cached)
        uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: cargo-binutils
      # Cache the QEMU apt package + its dependencies instead of re-downloading it
      # on every run.
      - name: Install QEMU (cached)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: qemu-system-arm
          version: 1.0
      - name: Install QEMU (RISC-V)
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-misc
          command -v qemu-system-riscv32
      - name: Run smoke tests + budget checks under QEMU
        run: |
          for bin in embedded-smoke; do
            out="smoke-$bin-${{ matrix.target }}.txt"
            cargo run -p "$bin" --release --target ${{ matrix.target }} ${{ matrix.args }} | tee "$out"
            bash ci/check_budgets.sh "$bin" ${{ matrix.target }} "$out" "${{ matrix.args }}"
          done
      # The cross-abi job compares the two thumbv7em outputs, produced in separate
      # matrix legs, so each leg's output is uploaded for it to fetch.
      - name: Upload smoke output
        uses: actions/upload-artifact@v4
        with:
          name: smoke-output-${{ matrix.target }}
          path: smoke-embedded-smoke-${{ matrix.target }}.txt
          if-no-files-found: error

  cross-abi:
    name: cross-ABI divergence guard
    needs: bare-metal
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Download soft-float (eabi) output
        uses: actions/download-artifact@v4
        with:
          name: smoke-output-thumbv7em-none-eabi
      - name: Download hardware-FPU (eabihf) output
        uses: actions/download-artifact@v4
        with:
          name: smoke-output-thumbv7em-none-eabihf
      - name: Download RISC-V (riscv32imc) output
        uses: actions/download-artifact@v4
        with:
          name: smoke-output-riscv32imc-unknown-none-elf
      - name: Download M0 (thumbv6m) output
        uses: actions/download-artifact@v4
        with:
          name: smoke-output-thumbv6m-none-eabi
      # Fails if soft-float (libm) and the hardware FPU disagree beyond tolerance.
      - name: Cross-ABI agreement (thumbv7em + riscv full-keyset, m0 subset)
        run: bash ci/check_cross_abi.sh smoke-embedded-smoke-thumbv7em-none-eabi.txt smoke-embedded-smoke-thumbv7em-none-eabihf.txt smoke-embedded-smoke-riscv32imc-unknown-none-elf.txt --subset smoke-embedded-smoke-thumbv6m-none-eabi.txt
