# Size and stack budgets, keyed by <binary>.<target>.
#
# Sections are [<binary>.<target>], where <binary> is the cargo package name of a
# smoke crate (embedded-smoke today; per-domain smoke binaries are added at v0.9+,
# each its own section) and <target> is one of the three bare-metal triples below.
# Splitting budgets per binary keeps the gate fair: a heavy new domain grows its own
# binary's budget and never spends another domain's headroom.
#
#   text_bytes            .text size of the release smoke binary.
#   stack_bytes_<scalar>  peak stack for that scalar type, matched to a
#                         STACK_HWM_BYTES_<SCALAR>=<n> line in the run output. The bare
#                         STACK_HWM_BYTES=<n> line counts as the f64 measurement. Only
#                         f64 is populated today; dual/hyperdual/jet rows are added per
#                         (binary x scalar) as differentiated dynamics lands (v0.9+).
#
# An absent or 0 budget is REPORT-ONLY (measured and printed, never gated).
# tolerance_pct applies to every gated row. Raising a budget is a reviewed re-baseline
# in the same PR — see ci/README.md. Never raise tolerance_pct to dodge a regression.
#
# Run the gate for one (binary, target):
#   cargo run -p <binary> --release --target <triple> | tee smoke-<binary>-<triple>.txt
#   bash ci/check_budgets.sh <binary> <triple> smoke-<binary>-<triple>.txt
#
# Read just the raw .text size:
#   cargo size --release -p <binary> --target <triple> -- -A

tolerance_pct = 10

[embedded-smoke.thumbv7em-none-eabi]
text_bytes = 30272
stack_bytes_f64 = 1935

[embedded-smoke.thumbv7em-none-eabihf]
text_bytes = 33372
stack_bytes_f64 = 2195

[embedded-smoke.thumbv6m-none-eabi]
text_bytes = 29968
stack_bytes_f64 = 2100
