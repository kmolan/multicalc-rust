# Supply-chain checks for cargo-deny.

[graph]
# multicalc-demos is a host-only, unpublished visualization satellite; its heavy Rerun tree is not
# part of the shipped or bare-metal graph, so it is excluded from the supply-chain audit.
exclude = ["multicalc-demos"]

[advisories]
# Fail on known security advisories and yanked crates.
version = 2
yanked = "deny"
# bare-metal 0.2.x is deprecated (unmaintained), pulled in transitively by
# cortex-m 0.7 for the dev-only embedded-smoke crate. No security impact and no
# fix available upstream, so this one advisory is accepted by ID.
#
# paste 1.0.15 is unmaintained (author archived the repo), pulled in transitively
# by riscv 0.12 for the same dev-only crate. No safe upgrade exists.
ignore = ["RUSTSEC-2026-0110", "RUSTSEC-2024-0436"]

[licenses]
# Only these licenses are allowed in the dependency tree. This list matches what
# the tree actually uses; a genuinely new license fails the check so it gets
# reviewed. Unicode-3.0 is kept for the newer unicode-ident that switched to it.
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  # riscv / riscv-rt / riscv-pac (embedded-smoke RISC-V leg); permissive, OSI/FSF-approved.
  "ISC",
]
confidence-threshold = 0.9
# Ignore workspace crates that are not published (embedded-smoke has no license).
private = { ignore = true }

[bans]
# The dev/demo tree (rerun, proptest) pulls many crates, so only warn on duplicates.
multiple-versions = "warn"
wildcards = "allow"

[sources]
# Only crates.io.
unknown-registry = "deny"
unknown-git = "deny"
