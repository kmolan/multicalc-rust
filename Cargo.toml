[package]
name = "multicalc"
version = "0.6.0"
authors = ["akathail <anmolkathail@gmail.com>"]
edition = "2024"
rust-version = "1.85"
description = "Rust scientific computing for single and multi-variable calculus"
repository = "https://github.com/kmolan/multicalc-rust"
license = "MIT"
documentation = "https://docs.rs/multicalc"
readme = "README.md"
keywords = ["Math", "Science", "Calculus", "Differentiation", "Integration"]
categories = ["mathematics", "science", "no-std"]

[dependencies]
libm = "0.2"

[dev-dependencies]
rand = "0.8"
criterion = "0.5"

[features]
default = []
alloc = []

[[bench]]
name = "calculus"
harness = false

[[bench]]
name = "linear_algebra"
harness = false

[[bench]]
name = "optimization"
harness = false

[lints.rust]
# Backs the "pure, safe Rust" claim: the crate must contain no `unsafe`.
unsafe_code = "forbid"

[lints.clippy]
# The `[&dyn Fn(&[f64; N]) -> f64; N]` field/transform arrays are inherent to the API.
type_complexity = "allow"
